services:
  mongodb:
    image: mongo:7
    container_name: demo-gamemaster-mongodb
    restart: unless-stopped
    ports:
      - '27018:27017'
    volumes:
      - demo_gamemaster_mongodb:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand({ ping: 1 })']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${L5R_API_IMAGE:-ghcr.io/gaetan1303/l5r-api:latest}
    container_name: demo-gamemaster-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://mongodb:27017/l5r
      JWT_SECRET: ${L5R_JWT_SECRET:-change-this-secret-before-public-demo}
      GM_FRONTEND_URL: ${L5R_GM_FRONTEND_URL:-http://localhost:3001}
      PLAYER_FRONTEND_URL: ${L5R_PLAYER_FRONTEND_URL:-http://localhost:3002}
    ports:
      - '5001:5001'

  gm-ui:
    image: ${L5R_GM_IMAGE:-ghcr.io/gaetan1303/gm-l5r:latest}
    container_name: demo-gamemaster-gm-ui
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 3001
      API_BASE_URL: ${L5R_API_BASE_URL:-http://localhost:5001}
    ports:
      - '3001:3001'

  player-ui:
    image: ${L5R_PLAYER_IMAGE:-ghcr.io/gaetan1303/jdr-test:latest}
    container_name: demo-gamemaster-player-ui
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 3002
      API_BASE_URL: ${L5R_API_BASE_URL:-http://localhost:5001}
    ports:
      - '3002:3002'

volumes:
  demo_gamemaster_mongodb:
